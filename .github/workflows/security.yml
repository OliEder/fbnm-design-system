name: Security & License Check

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 8 * * 1'   # Monday 08:00 UTC – weekly scan
  workflow_dispatch:

jobs:
  audit:
    name: Vulnerability Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run security audit
        run: pnpm audit --audit-level=high

  licenses:
    name: License Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate license report
        run: pnpm licenses list --json > licenses.json

      - name: Check for copyleft licenses
        run: |
          node -e "
            const data = JSON.parse(require('fs').readFileSync('licenses.json', 'utf8'));
            // Strong copyleft only: GPL/AGPL/SSPL/EUPL require derived works to be
            // released under the same license. LGPL is weak copyleft — linking to an
            // LGPL library (e.g. sharp/libvips) does NOT require your code to be LGPL,
            // so LGPL is intentionally excluded from this list.
            const forbidden = ['GPL-2.0','GPL-3.0','AGPL-3.0','SSPL','EUPL'];
            const issues = [];
            for (const [license, pkgs] of Object.entries(data)) {
              if (forbidden.some(f => license.includes(f))) {
                issues.push(...pkgs.map(p => p.name + '@' + p.version + ': ' + license));
              }
            }
            if (issues.length) {
              console.error('Strong copyleft licenses found — review required:');
              issues.forEach(i => console.error(' ', i));
              process.exit(1);
            }
            console.log('License check passed — no strong copyleft licenses found.');
          "

      - name: Upload license report
        uses: actions/upload-artifact@v4
        with:
          name: license-report
          path: licenses.json
          retention-days: 90
