name: Security & License Check

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 8 * * 1'   # Monday 08:00 UTC – weekly scan
  workflow_dispatch:

jobs:
  audit:
    name: Vulnerability Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run security audit
        run: pnpm audit --audit-level=high

  licenses:
    name: License Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate license report
        run: pnpm licenses list --json > licenses.json

      - name: Check for copyleft licenses
        run: |
          node -e "
            const data = JSON.parse(require('fs').readFileSync('licenses.json', 'utf8'));
            // Strong copyleft: GPL/AGPL/SSPL/EUPL. LGPL is weak copyleft and allowed
            // (linking to an LGPL lib, e.g. sharp/libvips, does not infect your code).
            // Use explicit LGPL guard first so 'LGPL-3.0-or-later'.includes('GPL-3.0')
            // substring collision cannot trigger a false positive.
            const isForbidden = (license) => {
              if (/^LGPL/i.test(license)) return false;
              return ['GPL-2.0','GPL-3.0','GPL-2.0-only','GPL-3.0-only','AGPL-3.0','SSPL','EUPL']
                .some(f => license === f || license.startsWith(f + '-') || license.startsWith(f + ' '));
            };
            const issues = [];
            for (const [license, pkgs] of Object.entries(data)) {
              if (isForbidden(license)) {
                issues.push(...pkgs.map(p => p.name + '@' + p.version + ': ' + license));
              }
            }
            if (issues.length) {
              console.error('Strong copyleft licenses found — review required:');
              issues.forEach(i => console.error(' ', i));
              process.exit(1);
            }
            console.log('License check passed — no strong copyleft licenses found.');
          "

      - name: Upload license report
        uses: actions/upload-artifact@v4
        with:
          name: license-report
          path: licenses.json
          retention-days: 90
