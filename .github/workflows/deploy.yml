name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Astro
        run: pnpm --filter @fbnm/web build
        env:
          ICAL_URL_HERREN: ${{ secrets.ICAL_URL_HERREN }}
          ICAL_URL_DAMEN: ${{ secrets.ICAL_URL_DAMEN }}

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HETZNER_FTP_HOST }}
          username: ${{ secrets.HETZNER_FTP_USER }}
          password: ${{ secrets.HETZNER_FTP_PASS }}
          local-dir: ./apps/web/dist/
          server-dir: /public_html/
          protocol: ftps
          exclude: |
            **/.git*
            **/.git*/**
