name: Nightly Rebuild

on:
  schedule:
    - cron: '0 2 * * *'  # Jede Nacht 02:00 UTC (= 03:00/04:00 MESZ/MEZ)
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild with fresh iCal data
        run: pnpm --filter @fbnm/web build
        env:
          ICAL_URL_HERREN: ${{ secrets.ICAL_URL_HERREN }}
          ICAL_URL_DAMEN: ${{ secrets.ICAL_URL_DAMEN }}

      - name: Deploy updated pages
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HETZNER_FTP_HOST }}
          username: ${{ secrets.HETZNER_FTP_USER }}
          password: ${{ secrets.HETZNER_FTP_PASS }}
          local-dir: ./apps/web/dist/
          server-dir: /public_html/
          protocol: ftps
          exclude: |
            **/.git*
            **/.git*/**
