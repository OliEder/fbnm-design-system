name: Nightly Rebuild

on:
  schedule:
    - cron: '0 2 * * *'  # Jede Nacht 02:00 UTC (= 03:00/04:00 MESZ/MEZ)
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild with fresh iCal data
        run: pnpm --filter @fbnm/web build
        env:
          ICAL_URL_HERREN: ${{ secrets.ICAL_URL_HERREN }}
          ICAL_URL_DAMEN: ${{ secrets.ICAL_URL_DAMEN }}

